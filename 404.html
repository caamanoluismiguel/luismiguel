<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not found · Luis Miguel Caamaño</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/assets/favicon.ico" />
    <meta name="theme-color" content="#f4ede4" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500&family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4ede4;
        --bg-alt: #f8f4ef;
        --bg-soft: #eadbc9;
        --ink: #101010;
        --ink-soft: #575049;
        --accent: #e35b2f;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(
          180deg,
          var(--bg-alt),
          var(--bg) 50%,
          var(--bg-soft)
        );
        color: var(--ink);
        font-family: "Sora", system-ui, sans-serif;
        padding: 2rem;
        text-align: center;
      }
      .num {
        font-family: "Bodoni Moda", serif;
        font-style: italic;
        font-weight: 500;
        font-size: clamp(6rem, 22vw, 14rem);
        line-height: 0.9;
        margin: 0;
        color: var(--accent);
      }
      h1 {
        margin: 1rem 0 0.6rem;
        font-family: "Bodoni Moda", serif;
        font-style: italic;
        font-weight: 500;
        font-size: clamp(1.4rem, 3.4vw, 2.4rem);
        letter-spacing: -0.01em;
      }
      p {
        margin: 0 0 1.4rem;
        max-width: 44ch;
        color: var(--ink-soft);
        font-size: 1rem;
      }
      a.home {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        border: 1px solid rgba(16, 16, 16, 0.26);
        border-radius: 999px;
        padding: 0.78rem 1.05rem;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink);
        text-decoration: none;
        transition:
          background-color 220ms ease,
          transform 220ms ease;
      }
      a.home:hover {
        transform: translateY(-2px);
        background: rgba(16, 16, 16, 0.06);
      }
      a.home::after {
        content: "↗";
      }
    </style>
  </head>
  <body>
    <main>
      <p class="num">404</p>
      <h1>This page is not here.</h1>
      <p>
        It moved, never existed, or someone wrote the link wrong. Either way —
        let's get you back.
      </p>
      <a class="home" href="/">Back to the work</a>
    </main>
  </body>
</html>
